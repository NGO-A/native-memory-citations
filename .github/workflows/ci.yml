name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-validate-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.19.0"
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Build and check manifest is not stale
        run: npm run plugin:build:check

      - name: Validate plugin metadata
        run: npx openclaw plugins validate --entry ./dist/index.js

      - name: Test
        run: npm test

      - name: Fail on stray whitespace/conflict markers
        run: git diff --check

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-validate-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        openclaw-version: ["2026.6.8", "2026.6.9"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.19.0"
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Install OpenClaw ${{ matrix.openclaw-version }}
        run: npm install --no-save --no-package-lock openclaw@${{ matrix.openclaw-version }}

      - name: Build and check manifest is not stale
        run: npm run plugin:build:check

      - name: Validate plugin metadata
        run: npx openclaw plugins validate --entry ./dist/index.js

      - name: Test
        run: npm test

      - name: Fail on stray whitespace/conflict markers
        run: git diff --check

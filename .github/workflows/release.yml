name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install (locked)
        run: npm ci

      - name: Stamp build provenance from the OpenClaw build host
        run: |
          set -euo pipefail
          export PATH="$PWD/node_modules/.bin:$PATH"
          OCV="$(openclaw --version | grep -oE '[0-9]{4}\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?' | head -n1)"
          [ -n "$OCV" ] || { echo "::error::could not resolve OpenClaw version"; exit 1; }
          export OCV
          SDKV="$(node -p "try{require('@openclaw/plugin-sdk/package.json').version}catch(e){process.env.OCV}")"
          export SDKV
          node -e 'const fs=require("fs"),p="package.json",j=JSON.parse(fs.readFileSync(p));j.openclaw.build={openclawVersion:process.env.OCV,pluginSdkVersion:process.env.SDKV};fs.writeFileSync(p,JSON.stringify(j,null,2)+"\n")'
          echo "stamped build.openclawVersion=$OCV build.pluginSdkVersion=$SDKV"

      - name: Build, check manifest, and validate
        run: |
          npm run plugin:build:check
          npx openclaw plugins validate --entry ./dist/index.js

      - name: Test
        run: npm test

      - name: Publish to npm (OIDC trusted publishing, provenance enabled)
        run: npm publish

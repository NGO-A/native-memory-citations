name: ClawHub Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview the ClawHub publish without uploading
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      publish_tag:
        description: ClawHub tag to update
        required: true
        default: latest
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-clawhub:
    runs-on: ubuntu-latest
    environment: clawhub-plugin-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install plugin dependencies
        run: npm ci

      - name: Build and check manifest
        run: npm run plugin:build:check

      - name: Validate plugin metadata
        run: npx openclaw plugins validate --entry ./dist/index.js

      - name: Test
        run: npm test

      - name: Checkout pinned ClawHub CLI
        uses: actions/checkout@v6
        with:
          repository: openclaw/clawhub
          ref: facf20ceb6cc459e2872d941e71335a784bbc55c
          path: clawhub-source
          persist-credentials: false

      - name: Install ClawHub CLI dependencies
        working-directory: clawhub-source
        run: bun install --frozen-lockfile

      - name: Pack for ClawHub
        run: |
          set -euo pipefail
          mkdir -p .local/clawhub
          bun clawhub-source/packages/clawhub/src/cli.ts package pack . \
            --pack-destination .local/clawhub \
            --json | tee .local/clawhub/pack.json

      - name: Publish to ClawHub
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          PUBLISH_TAG: ${{ inputs.publish_tag }}
        run: |
          set -euo pipefail
          package_path="$(node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync(".local/clawhub/pack.json","utf8")); if (!p.path) process.exit(1); console.log(p.path)')"
          publish_args=(
            package
            publish
            "${package_path}"
            --tags "${PUBLISH_TAG}"
            --source-repo "${GITHUB_REPOSITORY}"
            --source-commit "${GITHUB_SHA}"
            --source-ref "${GITHUB_REF}"
            --source-path "."
            --json
          )
          if [[ "${DRY_RUN}" == "true" ]]; then
            publish_args+=(--dry-run)
          fi
          bun clawhub-source/packages/clawhub/src/cli.ts "${publish_args[@]}"

